<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<title>도구 통합 검색 | WooaHouse — 350+ 무료 온라인 도구</title>
<meta name="description" content="WooaHouse 전체 350개 이상의 무료 온라인 도구를 한 번에 검색하세요. PDF, 이미지, 동영상, 텍스트, 계산기, 개발자 도구 등 카테고리별 필터 지원.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://wooahouse.com/search.html">
<meta property="og:title" content="도구 통합 검색 | WooaHouse">
<meta property="og:description" content="WooaHouse 전체 350+ 무료 온라인 도구를 한 번에 검색하세요.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://wooahouse.com/search.html">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#111;min-height:100vh}
a{color:inherit;text-decoration:none}

/* 헤더 */
.search-header{background:#fff;border-bottom:1px solid #e5e7eb;padding:16px 20px;display:flex;align-items:center;gap:16px}
.search-header a{font-size:13px;color:#6b7280;white-space:nowrap}
.search-header a:hover{color:#2563eb}

/* 히어로 */
.hero{text-align:center;padding:48px 20px 32px}
.hero h1{font-size:28px;font-weight:800;margin-bottom:8px;color:#111}
.hero p{color:#6b7280;font-size:15px}

/* 검색 박스 */
.search-wrap{max-width:640px;margin:0 auto 32px;padding:0 16px}
.search-box{display:flex;align-items:center;background:#fff;border:2px solid #e5e7eb;border-radius:14px;padding:12px 16px;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:border-color .2s}
.search-box:focus-within{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.search-box input{flex:1;border:none;outline:none;font-size:16px;background:transparent;color:#111;min-width:0}
.search-box input::placeholder{color:#9ca3af}
.search-box .clear-btn{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:18px;padding:0 2px;line-height:1;display:none}
.search-box .clear-btn.show{display:block}
.search-box .clear-btn:hover{color:#111}

/* 필터 칩 */
.filter-wrap{max-width:960px;margin:0 auto 24px;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid #e5e7eb;background:#fff;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:#2563eb;color:#2563eb}
.chip.active{background:#2563eb;color:#fff;border-color:#2563eb}

/* 결과 */
.results-wrap{max-width:960px;margin:0 auto;padding:0 16px 48px}
.result-count{font-size:13px;color:#6b7280;margin-bottom:16px}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.result-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:6px;transition:all .15s;cursor:pointer}
.result-card:hover{border-color:#2563eb;box-shadow:0 4px 12px rgba(37,99,235,.1);transform:translateY(-1px)}
.card-top{display:flex;align-items:center;gap:8px}
.card-site{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:#eff6ff;color:#2563eb;white-space:nowrap}
.card-name{font-size:14px;font-weight:700;color:#111;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-desc{font-size:12px;color:#6b7280;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.no-result{text-align:center;padding:60px 16px;color:#9ca3af;font-size:15px}

/* 초기 상태 (검색 전) */
.initial-msg{text-align:center;padding:40px 16px;color:#9ca3af;font-size:14px}

/* 사이트 배지 색상 */
.badge-WooaPDF{background:#fff1f2;color:#e11d48}
.badge-WooaImage{background:#ede9fe;color:#7c3aed}
.badge-WooaColor{background:#fdf4ff;color:#9333ea}
.badge-WooaText{background:#ecfdf5;color:#059669}
.badge-WooaQR{background:#eff6ff;color:#2563eb}
.badge-WooaCalc{background:#eff6ff;color:#2563eb}
.badge-WooaAudio{background:#f5f3ff;color:#7c3aed}
.badge-WooaVideo{background:#fff7ed;color:#ea580c}
.badge-WooaViewer{background:#f0fdf4;color:#16a34a}
.badge-WooaDev{background:#f0f9ff;color:#0284c7}
.badge-WooaOCR{background:#fffbeb;color:#d97706}
.badge-WooaSheet{background:#f0fdf4;color:#16a34a}
.badge-WooaSEO{background:#eef2ff;color:#4f46e5}
.badge-WooaGosa{background:#fdf2f8;color:#c026d3}

@media(max-width:480px){.hero h1{font-size:22px}.results-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="search-header">
  <a href="https://wooahouse.com/">🏠 WooaHouse</a>
  <span style="color:#e5e7eb">›</span>
  <span style="font-weight:600;font-size:13px">도구 통합 검색</span>
</div>

<div class="hero">
  <h1>🔍 WooaHouse 도구 통합 검색</h1>
  <p>PDF · 이미지 · 오디오 · 계산기 · 개발 도구 등 350+ 무료 도구를 한 번에 검색하세요</p>
</div>

<div class="search-wrap">
  <div class="search-box">
    <span>🔍</span>
    <input id="searchInput" type="search" placeholder="도구 검색... (예: PDF 분할, 이미지 압축, QR 코드)" autocomplete="off" autofocus/>
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="filter-wrap" id="filterWrap">
  <button class="chip active" data-site="all" onclick="filterSite(this)">전체</button>
</div>

<div class="results-wrap">
  <div class="result-count" id="resultCount" style="display:none"></div>
  <div id="resultsContainer">
    <div class="initial-msg">검색어를 입력하거나 필터를 선택하세요</div>
  </div>
</div>

<script>
let allTools = [];
let currentSite = 'all';
let currentQuery = '';

const SITE_ORDER = ['WooaPDF','WooaImage','WooaColor','WooaText','WooaQR','WooaCalc','WooaAudio','WooaVideo','WooaViewer','WooaDev','WooaOCR','WooaSheet','WooaSEO','WooaGosa'];

fetch('https://wooahouse.com/tools.json')
  .then(r => r.json())
  .then(data => {
    allTools = data;
    buildFilters(data);
    renderResults();
  });

function buildFilters(data) {
  const sites = [...new Set(data.map(t => t.s))].sort((a,b) => SITE_ORDER.indexOf(a) - SITE_ORDER.indexOf(b));
  const wrap = document.getElementById('filterWrap');
  const totalChip = wrap.querySelector('[data-site="all"]');
  totalChip.textContent = `전체 (${data.length})`;
  sites.forEach(s => {
    const cnt = data.filter(t => t.s === s).length;
    const c = document.createElement('button');
    c.className = 'chip';
    c.dataset.site = s;
    c.textContent = `${s} (${cnt})`;
    c.onclick = function(){ filterSite(this); };
    wrap.appendChild(c);
  });
}

function filterSite(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentSite = el.dataset.site;
  renderResults();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  document.getElementById('clearBtn').classList.remove('show');
  renderResults();
}

document.getElementById('searchInput').addEventListener('input', function() {
  currentQuery = this.value.trim();
  document.getElementById('clearBtn').classList.toggle('show', !!currentQuery);
  renderResults();
});

function renderResults() {
  const q = currentQuery.toLowerCase();
  let filtered = allTools;
  if (currentSite !== 'all') filtered = filtered.filter(t => t.s === currentSite);
  if (q) {
    filtered = filtered.filter(t =>
      t.n.toLowerCase().includes(q) ||
      t.d.toLowerCase().includes(q) ||
      t.s.toLowerCase().includes(q)
    );
  }

  const container = document.getElementById('resultsContainer');
  const countEl = document.getElementById('resultCount');

  if (!q && currentSite === 'all') {
    container.innerHTML = '<div class="initial-msg">검색어를 입력하거나 필터를 선택하세요</div>';
    countEl.style.display = 'none';
    return;
  }

  countEl.style.display = 'block';
  countEl.textContent = `검색 결과: ${filtered.length}개`;

  if (!filtered.length) {
    container.innerHTML = '<div class="no-result">😅 검색 결과가 없습니다. 다른 키워드로 시도해보세요.</div>';
    return;
  }

  container.innerHTML = '<div class="results-grid">' +
    filtered.map(t => `
      <a href="${t.u}" class="result-card" target="_blank" rel="noopener">
        <div class="card-top">
          <span class="card-site badge-${t.s.replace(/\s/g,'')}">${t.s}</span>
          <span class="card-name">${t.n}</span>
        </div>
        ${t.d ? `<p class="card-desc">${t.d}</p>` : ''}
      </a>`).join('')
    + '</div>';
}
</script>
</body>
</html>
