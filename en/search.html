<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
<title>Tool Search | WooaHouse — 350+ Free Online Tools</title>
<meta name="description" content="Search 350+ free online tools across all WooaHouse services. PDF, image, audio, calculator, developer tools and more — find the right tool instantly.">
<meta name="robots" content="index, follow">

<link rel="alternate" hreflang="ko" href="https://wooahouse.com/search.html">
<link rel="alternate" hreflang="en" href="https://wooahouse.com/en/search.html">
<meta property="og:title" content="Tool Search | WooaHouse">
<meta property="og:description" content="Search 350+ free online tools across all WooaHouse services.">

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6464921081676309" crossorigin="anonymous"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#111;min-height:100vh}
a{color:inherit;text-decoration:none}

.search-header{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 20px;display:flex;align-items:center;gap:12px}
.search-header a{font-size:13px;color:#6b7280}
.search-header a:hover{color:#2563eb}
.lang-switch{margin-left:auto;display:flex;gap:8px;font-size:12px}
.lang-switch a{padding:2px 8px;border-radius:10px;border:1px solid #e5e7eb;color:#6b7280}
.lang-switch a.active{background:#2563eb;color:#fff;border-color:#2563eb}

.mobile-top-ad{display:none;padding:8px 16px;background:#fff;border-bottom:1px solid #f0f0f0}
@media(max-width:900px){.mobile-top-ad{display:block}}

.page-layout{display:flex;gap:0;max-width:1280px;margin:0 auto;align-items:flex-start}
.search-main{flex:1;min-width:0;padding-bottom:48px}

.hero{text-align:center;padding:36px 20px 24px}
.hero h1{font-size:26px;font-weight:800;margin-bottom:6px;color:#111}
.hero p{color:#6b7280;font-size:14px}

.search-wrap{max-width:600px;margin:0 auto 24px;padding:0 16px}
.search-box{display:flex;align-items:center;background:#fff;border:2px solid #e5e7eb;border-radius:14px;padding:12px 16px;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:border-color .2s}
.search-box:focus-within{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.search-box input{flex:1;border:none;outline:none;font-size:16px;background:transparent;color:#111;min-width:0}
.search-box input::placeholder{color:#9ca3af}
.clear-btn{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:18px;padding:0 2px;line-height:1;display:none}
.clear-btn.show{display:block}
.clear-btn:hover{color:#111}

.filter-wrap{padding:0 16px 20px;display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:5px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid #e5e7eb;background:#fff;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:#2563eb;color:#2563eb}
.chip.active{background:#2563eb;color:#fff;border-color:#2563eb}

.results-wrap{padding:0 16px}
.result-count{font-size:13px;color:#6b7280;margin-bottom:14px}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.result-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:6px;transition:all .15s}
.result-card:hover{border-color:#2563eb;box-shadow:0 4px 12px rgba(37,99,235,.1);transform:translateY(-1px)}
.card-top{display:flex;align-items:center;gap:8px}
.card-site{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:#eff6ff;color:#2563eb;white-space:nowrap;flex-shrink:0}
.card-name{font-size:14px;font-weight:700;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-desc{font-size:12px;color:#6b7280;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.no-result{text-align:center;padding:60px 16px;color:#9ca3af;font-size:15px}
.initial-msg{text-align:center;padding:40px 16px;color:#9ca3af;font-size:14px}

/* Site group layout */
.site-group{margin-bottom:32px}
.site-group-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e5e7eb}
.site-group-title{font-size:16px;font-weight:800;color:#111}
.site-group-count{font-size:12px;color:#9ca3af;font-weight:500}

.search-sidebar{width:200px;flex-shrink:0;padding:24px 16px 24px 0;display:flex;flex-direction:column;gap:16px;position:sticky;top:16px}
.ad-card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;padding:8px}
@media(max-width:900px){.search-sidebar{display:none}}

.badge-WooaPDF{background:#fff1f2;color:#e11d48}
.badge-WooaImage{background:#ede9fe;color:#7c3aed}
.badge-WooaColor{background:#fdf4ff;color:#9333ea}
.badge-WooaText{background:#ecfdf5;color:#059669}
.badge-WooaQR{background:#eff6ff;color:#2563eb}
.badge-WooaCalc{background:#eff6ff;color:#2563eb}
.badge-WooaAudio{background:#f5f3ff;color:#7c3aed}
.badge-WooaVideo{background:#fff7ed;color:#ea580c}
.badge-WooaViewer{background:#f0fdf4;color:#16a34a}
.badge-WooaDev{background:#f0f9ff;color:#0284c7}
.badge-WooaOCR{background:#fffbeb;color:#d97706}
.badge-WooaSheet{background:#f0fdf4;color:#16a34a}
.badge-WooaSEO{background:#eef2ff;color:#4f46e5}
.badge-WooaGosa{background:#fdf2f8;color:#c026d3}
</style>
</head>
<body>

<div class="search-header">
  <a href="https://wooahouse.com/">🏠 WooaHouse</a>
  <span style="color:#e5e7eb">›</span>
  <span style="font-weight:600;font-size:13px">Tool Search</span>
  <div class="lang-switch">
    <a href="../search.html">KO</a>
    <a href="search.html" class="active">EN</a>
  </div>
</div>

<div class="mobile-top-ad">
  <ins class="adsbygoogle" style="display:block;width:100%;height:80px"
    data-ad-client="ca-pub-6464921081676309" data-ad-slot="7080296704"
    data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div class="page-layout">

  <div class="search-main">
    <div class="hero">
      <h1>🔍 WooaHouse Tool Search</h1>
      <p>PDF · Image · Audio · Calculator · Dev tools — Search 350+ free tools in one place</p>
    </div>

    <div class="search-wrap">
      <div class="search-box">
        <span>🔍</span>
        <input id="searchInput" type="search" placeholder="Search tools... (e.g. split PDF, compress image, QR code)" autocomplete="off" autofocus/>
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
      </div>
    </div>

    <div class="filter-wrap" id="filterWrap">
      <button class="chip active" data-site="all" onclick="filterSite(this)">All</button>
    </div>

    <div class="results-wrap">
      <div class="result-count" id="resultCount" style="display:none"></div>
      <div id="resultsContainer">
        <div class="initial-msg">Enter a keyword or select a filter to browse tools</div>
      </div>
    </div>
  </div>

  <aside class="search-sidebar">
    <div class="ad-card">
      <ins class="adsbygoogle" style="display:block;width:100%;min-height:250px"
        data-ad-client="ca-pub-6464921081676309" data-ad-slot="1419180025"
        data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    <div class="ad-card">
      <script>new PartnersCoupang.G({"id":986943,"template":"carousel","trackingCode":"AF5600192","width":"160","height":"200","tsource":""});</script>
    </div>
  </aside>

</div>

<script>
let allTools = [];
let currentSite = 'all';
let currentQuery = '';

const SITE_ORDER = ['WooaPDF','WooaImage','WooaColor','WooaText','WooaQR','WooaCalc','WooaAudio','WooaVideo','WooaViewer','WooaDev','WooaOCR','WooaSheet','WooaSEO','WooaGosa'];

// URL ?q= param
const urlQ = new URLSearchParams(location.search).get('q') || '';
if (urlQ) {
  currentQuery = urlQ;
  document.getElementById('searchInput').value = urlQ;
  document.getElementById('clearBtn').classList.add('show');
}

fetch('https://wooahouse.com/tools.json')
  .then(r => r.json())
  .then(data => {
    allTools = data;
    buildFilters(data);
    renderResults();
  });

function getName(t) { return t.ne || t.n; }
function getUrl(t)  { return t.ue || t.u; }
function getDesc(t) { return t.de || t.d; }

function buildFilters(data) {
  const sites = [...new Set(data.map(t => t.s))].sort((a,b) => SITE_ORDER.indexOf(a) - SITE_ORDER.indexOf(b));
  const wrap = document.getElementById('filterWrap');
  const totalChip = wrap.querySelector('[data-site="all"]');
  totalChip.textContent = `All (${data.length})`;
  sites.forEach(s => {
    const cnt = data.filter(t => t.s === s).length;
    const c = document.createElement('button');
    c.className = 'chip';
    c.dataset.site = s;
    c.textContent = `${s} (${cnt})`;
    c.onclick = function(){ filterSite(this); };
    wrap.appendChild(c);
  });
}

function filterSite(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentSite = el.dataset.site;
  renderResults();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  document.getElementById('clearBtn').classList.remove('show');
  renderResults();
}

document.getElementById('searchInput').addEventListener('input', function() {
  currentQuery = this.value.trim();
  document.getElementById('clearBtn').classList.toggle('show', !!currentQuery);
  renderResults();
});

function cardHtml(t) {
  return `<a href="${getUrl(t)}" class="result-card" target="_blank" rel="noopener">
    <div class="card-top">
      <span class="card-site badge-${t.s.replace(/\s/g,'')}">${t.s}</span>
      <span class="card-name">${getName(t)}</span>
    </div>
    ${getDesc(t) ? `<p class="card-desc">${getDesc(t)}</p>` : ''}
  </a>`;
}

function renderResults() {
  const q = currentQuery.toLowerCase();
  let filtered = allTools;
  if (currentSite !== 'all') filtered = filtered.filter(t => t.s === currentSite);
  if (q) {
    filtered = filtered.filter(t =>
      getName(t).toLowerCase().includes(q) ||
      (getDesc(t) && getDesc(t).toLowerCase().includes(q)) ||
      t.s.toLowerCase().includes(q)
    );
  }

  const container = document.getElementById('resultsContainer');
  const countEl = document.getElementById('resultCount');

  if (!allTools.length) {
    container.innerHTML = '<div class="initial-msg">Enter a keyword or select a filter to browse tools</div>';
    countEl.style.display = 'none';
    return;
  }

  if (!filtered.length) {
    countEl.style.display = 'block';
    countEl.textContent = `Results: 0 tools`;
    container.innerHTML = '<div class="no-result">😅 No results found. Try a different keyword.</div>';
    return;
  }

  // No query + All → grouped by site
  if (!q && currentSite === 'all') {
    countEl.style.display = 'block';
    countEl.textContent = `All ${filtered.length} tools`;
    const groups = SITE_ORDER.map(s => ({ s, tools: filtered.filter(t => t.s === s) })).filter(g => g.tools.length);
    container.innerHTML = groups.map(g => `
      <div class="site-group">
        <div class="site-group-header">
          <span class="card-site badge-${g.s.replace(/\s/g,'')}" style="font-size:12px">${g.s}</span>
          <span class="site-group-title">${g.s}</span>
          <span class="site-group-count">${g.tools.length} tools</span>
        </div>
        <div class="results-grid">${g.tools.map(cardHtml).join('')}</div>
      </div>`).join('');
    return;
  }

  // Query or specific site → flat list
  countEl.style.display = 'block';
  countEl.textContent = `Results: ${filtered.length} tools`;
  container.innerHTML = '<div class="results-grid">' + filtered.map(cardHtml).join('') + '</div>';
}
</script>
</body>
</html>
